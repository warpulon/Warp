<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .timezone-label {
            font-size: 1.1em;
            color: #87ceeb;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .timezone-name {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }

        .digital-time {
            font-size: 2.5em;
            color: #00ff88;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }

        .date-display {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
        }

        .day-of-week {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.6);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            color: #1e3c72;
            border: none;
            padding: 12px 25px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Courier New', monospace;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        .add-timezone-input {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        input[type="text"] {
            padding: 10px 15px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1em;
            font-family: 'Courier New', monospace;
            backdrop-filter: blur(10px);
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: rgba(0, 255, 136, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .info {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-top: 20px;
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            padding: 5px 10px;
            font-size: 0.8em;
            margin-top: 10px;
            width: 100%;
        }

        .remove-btn:hover {
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 World Clock</h1>
        
        <div class="clocks-grid" id="clocksGrid">
            <!-- Clocks will be generated here -->
        </div>

        <div class="controls">
            <button onclick="resetClocks()">Reset to Default</button>
            <button onclick="toggle24Hour()">Toggle 12/24 Hour</button>
        </div>

        <div class="add-timezone-input">
            <input type="text" id="timezoneInput" placeholder="Enter timezone (e.g., America/New_York, Asia/Tokyo)" />
            <button onclick="addCustomTimezone()">Add Timezone</button>
        </div>

        <div class="info">
            <p>💡 Tip: Type a timezone name and click "Add Timezone" to add more locations!</p>
        </div>
    </div>

    <script>
        let timezones = [
            { label: 'New York', timezone: 'America/New_York' },
            { label: 'London', timezone: 'Europe/London' },
            { label: 'Tokyo', timezone: 'Asia/Tokyo' },
            { label: 'Dubai', timezone: 'Asia/Dubai' },
            { label: 'Sydney', timezone: 'Australia/Sydney' },
            { label: 'São Paulo', timezone: 'America/Sao_Paulo' }
        ];

        let use24Hour = true;

        function formatTime(date, is24Hour) {
            let hours = date.getHours();
            let minutes = date.getMinutes();
            let seconds = date.getSeconds();

            if (!is24Hour) {
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                hours = hours ? hours : 12;
                return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')} ${ampm}`;
            }

            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function getDateString(date) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        function updateClocks() {
            const grid = document.getElementById('clocksGrid');
            grid.innerHTML = '';

            timezones.forEach((tz, index) => {
                const date = new Date().toLocaleString('en-US', { timeZone: tz.timezone });
                const tzDate = new Date(date);

                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <div class="timezone-label">${tz.label}</div>
                    <div class="timezone-name">${tz.timezone}</div>
                    <div class="digital-time">${formatTime(tzDate, use24Hour)}</div>
                    <div class="date-display">${getDateString(tzDate)}</div>
                    <div class="day-of-week">
                        ${tzDate.toLocaleDateString('en-US', { weekday: 'long' })}
                    </div>
                    <button class="remove-btn" onclick="removeTimezone(${index})">Remove</button>
                `;
                grid.appendChild(card);
            });
        }

        function addCustomTimezone() {
            const input = document.getElementById('timezoneInput');
            const timezone = input.value.trim();

            if (!timezone) {
                alert('Please enter a timezone');
                return;
            }

            try {
                new Date().toLocaleString('en-US', { timeZone: timezone });
                const label = timezone.split('/').pop().replace(/_/g, ' ');
                timezones.push({ label, timezone });
                input.value = '';
                updateClocks();
            } catch (e) {
                alert('Invalid timezone. Please use format like: America/New_York, Asia/Tokyo, etc.');
            }
        }

        function removeTimezone(index) {
            if (timezones.length > 1) {
                timezones.splice(index, 1);
                updateClocks();
            } else {
                alert('You must have at least one timezone!');
            }
        }

        function resetClocks() {
            timezones = [
                { label: 'New York', timezone: 'America/New_York' },
                { label: 'London', timezone: 'Europe/London' },
                { label: 'Tokyo', timezone: 'Asia/Tokyo' },
                { label: 'Dubai', timezone: 'Asia/Dubai' },
                { label: 'Sydney', timezone: 'Australia/Sydney' },
                { label: 'São Paulo', timezone: 'America/Sao_Paulo' }
            ];
            updateClocks();
        }

        function toggle24Hour() {
            use24Hour = !use24Hour;
            updateClocks();
        }

        // Update clocks every second
        setInterval(updateClocks, 1000);

        // Initial update
        updateClocks();

        // Allow Enter key to add timezone
        document.getElementById('timezoneInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addCustomTimezone();
            }
        });
    </script>
</body>
</html>
